name: Buscador RD CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    name: pytest
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/btdigg-rd/requirements-dev.txt

      - name: Prepare evidence folder
        run: New-Item -ItemType Directory -Force _codex_runtime/artifacts | Out-Null

      - name: Compile Python files
        run: python -m compileall -q services/btdigg-rd services/cloudflared

      - name: Run pytest
        run: python -m pytest -q --junitxml _codex_runtime/artifacts/buscador-rd-pytest-junit.xml --durations=20

      - name: Write review summary
        if: always()
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_STEP_SUMMARY "## Buscador RD CI"
          Add-Content $env:GITHUB_STEP_SUMMARY ""
          Add-Content $env:GITHUB_STEP_SUMMARY "- Commit: $env:GITHUB_SHA"
          Add-Content $env:GITHUB_STEP_SUMMARY "- Ref: $env:GITHUB_REF"
          Add-Content $env:GITHUB_STEP_SUMMARY '- Evidence: artifact `buscador-rd-pytest-evidence`'

          $junitPath = "_codex_runtime/artifacts/buscador-rd-pytest-junit.xml"
          if (Test-Path $junitPath) {
            [xml]$junit = Get-Content $junitPath
            $suites = @()
            if ($junit.testsuites.testsuite) {
              $suites = @($junit.testsuites.testsuite)
            } elseif ($junit.testsuite) {
              $suites = @($junit.testsuite)
            }

            $tests = 0
            $failures = 0
            $errors = 0
            $skipped = 0
            foreach ($suite in $suites) {
              $tests += [int]$suite.tests
              $failures += [int]$suite.failures
              $errors += [int]$suite.errors
              $skipped += [int]$suite.skipped
            }

            Add-Content $env:GITHUB_STEP_SUMMARY ""
            Add-Content $env:GITHUB_STEP_SUMMARY "### Pytest"
            Add-Content $env:GITHUB_STEP_SUMMARY ""
            Add-Content $env:GITHUB_STEP_SUMMARY "- Tests: $tests"
            Add-Content $env:GITHUB_STEP_SUMMARY "- Failures: $failures"
            Add-Content $env:GITHUB_STEP_SUMMARY "- Errors: $errors"
            Add-Content $env:GITHUB_STEP_SUMMARY "- Skipped: $skipped"
          } else {
            Add-Content $env:GITHUB_STEP_SUMMARY ""
            Add-Content $env:GITHUB_STEP_SUMMARY "No pytest JUnit report was generated."
          }

      - name: Upload pytest evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buscador-rd-pytest-evidence
          path: _codex_runtime/artifacts/
          if-no-files-found: warn
          retention-days: 30
