name: buscador-rd

services:
  whisper:
    image: hwdsl2/whisper-server:latest
    container_name: whisper
    restart: unless-stopped
    ports:
      - "9017:9000"
    environment:
      - TZ=Europe/Madrid
      - WHISPER_MODEL=large-v3-turbo
      - WHISPER_LANGUAGE=es
      - WHISPER_DEVICE=cpu
      - WHISPER_COMPUTE_TYPE=int8
      - WHISPER_THREADS=5
      - WHISPER_BEAM=5
      - WHISPER_API_KEY=${WHISPER_API_KEY}
      - WHISPER_LOG_LEVEL=INFO
    volumes:
      - ./config/whisper/data:/var/lib/whisper
      - ./config/whisper/logs:/app/logs

  btdigg-rd:
    build:
      context: ./services/btdigg-rd
    container_name: btdigg-rd
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "9007:9007"
    environment:
      - PORT=9007
      - TZ=Europe/Madrid
      - BROWSER_BIN=/usr/bin/chromium
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - REAL_DEBRID_TOKEN=${REAL_DEBRID_TOKEN}
      - REAL_DEBRID_API=${REAL_DEBRID_API}
      - RDT_BASE=${RDT_BASE}
      - RDT_USER=${RDT_USER}
      - RDT_PASS=${RDT_PASS}
      - QBIT_BASE=${QBIT_BASE}
      - QBIT_USER=${QBIT_USER}
      - QBIT_PASS=${QBIT_PASS}
      - ARR_TORRENT_INBOX=/watch/torrents/inbox
      - DATA_DIR=/app/data
      - BTDIGG_PUBLIC_DIAGNOSTICS_DIR=/app/diagnostics_public
      - BTDIGG_PUBLIC_DIAGNOSTICS_EXTRA_ROOTS=/app/public_sources/cloudflared_data=cloudflared/data;/app/public_sources/cloudflared_logs=cloudflared/logs;/app/public_sources/whisper_logs=whisper/logs
      - BTDIGG_PROJECT_PUSH_ENABLED=1
      - BTDIGG_PROJECT_ROOT=/app/project
      - "BTDIGG_PROJECT_PUSH_REMOTE=git@github.com:jodiazhidalgo-collab/buscador-rd.git"
      - BTDIGG_PROJECT_PUSH_SSH_KEY=/app/git_key/publish_ed25519
      - "BTDIGG_PROJECT_PUSH_MESSAGE=chore: publish diagnostics from web"
      - BTDIGG_RUNTIME_DIR=/app/data/motor
      - BTDIGG_CONFIG_FILE=/app/data/motor/config.json
      - BTDIGG_TOKEN_FILE=/app/data/motor/rd_token.txt
      - BTDIGG_EXPORT_DIR=/app/data/motor/exports
      - BTDIGG_VOICE_TRANSCRIBE_PROVIDER=openai
      - BTDIGG_VOICE_OPENAI_BASE_URL=http://whisper:9000/v1
      - BTDIGG_VOICE_OPENAI_API_KEY=${BTDIGG_VOICE_OPENAI_API_KEY}
      - BTDIGG_VOICE_OPENAI_MODEL=whisper-1
      - BTDIGG_VOICE_OPENAI_PROMPT=Titulo de pelicula dictado por voz.
      - BTDIGG_VOICE_OPENAI_TEMPERATURE=0
      - BTDIGG_VOICE_TRANSCRIBE_TIMEOUT_SEC=120
    volumes:
      - ./config/btdigg-rd/data:/app/data
      - ./diagnostics_public:/app/diagnostics_public:rw
      - ./:/app/project:rw
      - ./config/btdigg-rd/git/publish_ed25519:/app/git_key/publish_ed25519:ro
      - ./config/cloudflared/data:/app/public_sources/cloudflared_data:ro
      - ./config/cloudflared/logs:/app/public_sources/cloudflared_logs:ro
      - ./config/whisper/logs:/app/public_sources/whisper_logs:ro
      - ${ARR_TORRENT_INBOX_HOST}:/watch/torrents/inbox:rw

  cloudflared:
    build:
      context: ./services/cloudflared
      dockerfile: Dockerfile
    container_name: cloudflared
    restart: unless-stopped
    env_file:
      - ./config/cloudflared/config/public.env
      - ./config/cloudflared/config/secrets.env
    environment:
      - TZ=Europe/Madrid
      - TUNNEL_TARGET=${TUNNEL_TARGET}
      - CLOUDFLARED_LOG=/app/logs/cloudflared/cloudflared.log
      - STATE_FILE=/app/data/estado/tunnel_state.json
      - LINK_FILE=/app/data/estado/enlace_usuario.txt
      - WORKER_SOURCE=/app/worker/gateway_worker.js
      - WATCHER_LOG=/app/logs/watcher/watcher.log
      - POLL_SECONDS=4
    volumes:
      - ./config/cloudflared/logs:/app/logs:rw
      - ./config/cloudflared/data:/app/data:rw
      - ./services/cloudflared/worker:/app/worker:ro
